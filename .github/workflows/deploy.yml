name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: false
          script: |
            # set -e
            echo "🚀 Starting deployment..."
            
            echo "🔍 Environment check:"
            echo "   User: $(whoami)"
            echo "   Home: $HOME"
            echo "   PWD: $(pwd)"
            echo "   PATH: $PATH"
            
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then 
              echo "❌ DEPLOY_PATH secret is required"
              exit 1
            fi
            
            echo "📁 Deploy path: $DEPLOY_PATH"
            echo "🔍 Checking if directory exists..."
            ls -la "$(dirname "$DEPLOY_PATH")" || echo "⚠️ Cannot list parent directory"
            
            echo "📂 Creating deploy directory..."
            mkdir -p "$DEPLOY_PATH" || {
              echo "❌ Failed to create directory $DEPLOY_PATH"
              echo "🔍 Current user: $(whoami)"
              echo "🔍 Current directory: $(pwd)"
              echo "🔍 Disk space: $(df -h .)"
              exit 1
            }
            
            echo "✅ Directory created/verified"
            echo "🔍 Listing deploy directory contents:"
            if ls -la "$DEPLOY_PATH"; then
              echo "✅ Directory listing successful"
            else
              echo "❌ Directory listing failed with exit code: $?"
              echo "🔍 Trying to debug directory access..."
              echo "   Directory exists: $([ -d "$DEPLOY_PATH" ] && echo "yes" || echo "no")"
              echo "   Directory readable: $([ -r "$DEPLOY_PATH" ] && echo "yes" || echo "no")"
              echo "   Directory executable: $([ -x "$DEPLOY_PATH" ] && echo "yes" || echo "no")"
              echo "   Current permissions: $(ls -ld "$DEPLOY_PATH" 2>/dev/null || echo "cannot check")"
              exit 1
            fi
            
            echo "🔍 About to check git directory..."
            echo "🔍 Checking git directory..."
            echo "   .git exists: $([ -d "$DEPLOY_PATH/.git" ] && echo "yes" || echo "no")"
            echo "   .git readable: $([ -r "$DEPLOY_PATH/.git" ] && echo "yes" || echo "no")"
            echo "   .git executable: $([ -x "$DEPLOY_PATH/.git" ] && echo "yes" || echo "no")"
            
            echo "🔍 About to enter git condition check..."
            echo "🔍 Testing git directory condition..."
            
            # Test the condition separately
            if [ -d "$DEPLOY_PATH/.git" ]; then
              echo "✅ Git directory exists, will update"
              GIT_EXISTS=true
            else
              echo "❌ Git directory does not exist, will clone"
              GIT_EXISTS=false
            fi
            
            echo "🔍 Condition test result: GIT_EXISTS=$GIT_EXISTS"
            
            if [ "$GIT_EXISTS" = "true" ]; then
              echo "🔄 Updating existing repository..."
              echo "🔍 Current git status before update:"
              cd "$DEPLOY_PATH" || {
                echo "❌ Cannot cd to $DEPLOY_PATH"
                exit 1
              }
              echo "📍 In deploy directory: $(pwd)"
              git status || echo "⚠️ Git status failed"
              git remote -v || echo "⚠️ Git remote failed"
              
              echo "📥 Fetching latest changes..."
              git fetch origin main --depth=1 || {
                echo "❌ Git fetch failed"
                echo "🔍 Git error details:"
                git status || true
                exit 1
              }
              
              echo "🔄 Resetting to latest main..."
              git reset --hard origin/main || {
                echo "❌ Git reset failed"
                echo "🔍 Git error details:"
                git status || true
                exit 1
              }
              
              echo "✅ Git update completed"
            else
              echo "📥 Cloning repository..."
              git clone --depth=1 https://github.com/${{ github.repository }} "$DEPLOY_PATH" || {
                echo "❌ Git clone failed"
                exit 1
              }
            fi
            
            echo "🔍 About to cd to deploy path..."
            cd "$DEPLOY_PATH" || {
              echo "❌ Cannot cd to $DEPLOY_PATH after git operations"
              exit 1
            }
            
            echo "📍 Current directory: $(pwd)"
            echo "📋 Git status:"
            git log --oneline -3 || echo "⚠️ Git log failed"
            git status || echo "⚠️ Git status failed"
            
            # Ensure env file exists (copy once from example if missing)
            if [ ! -f .env ]; then 
              echo "📝 Creating .env from example..."
              cp env.example .env || echo "⚠️ Warning: could not copy env.example"
            fi
            
            echo "🐳 Checking Docker..."
            docker --version || echo "❌ Docker not available"
            docker compose version || echo "❌ Docker Compose not available"
            
            echo "🔧 Building and starting services..."
            # Stop existing services first
            docker compose -f docker-compose.prod.yml down || echo "⚠️ No existing services to stop"
            
            # Build and start
            docker compose -f docker-compose.prod.yml up -d --build || {
              echo "❌ Docker Compose failed. Checking logs..."
              docker compose -f docker-compose.prod.yml logs || true
              exit 1
            }
            
            echo "🧹 Cleaning up Docker..."
            docker system prune -f || true
            
            echo "✅ Deployment completed successfully!"
            echo "📊 Service status:"
            docker compose -f docker-compose.prod.yml ps || true

